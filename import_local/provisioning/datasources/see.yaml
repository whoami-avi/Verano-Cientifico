apiVersion: 1

datasources:
  - name: SEE PostgreSQL
    uid: see_pg
    type: postgres
    access: proxy
    # Docker Compose define SEE_PG_URL=db:5432 automaticamente.
    # PARA USO MANUAL (tu Grafana nativa): reemplaza la linea de abajo por:
    #   url: localhost:5432      (si tu Postgres corre nativo en tu Mac)
    #   url: localhost:5433      (si levantaste SOLO la base con este docker-compose)
    url: $SEE_PG_URL
    user: see_user
    database: see_db
    isDefault: true
    editable: true
    secureJsonData:
      password: see_pass_2026
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
