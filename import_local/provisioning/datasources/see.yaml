apiVersion: 1

datasources:
  - name: SEE PostgreSQL
    uid: see_pg
    type: postgres
    access: proxy
    # Con Docker Compose la URL correcta es "db:5432" (nombre del servicio de la base).
    # PARA USO MANUAL (tu Grafana nativa) reemplaza por:
    #   url: localhost:5432   (Postgres nativo en tu Mac)   o  url: localhost:5433
    url: db:5432
    user: see_user
    database: see_db
    isDefault: true
    editable: true
    secureJsonData:
      password: see_pass_2026
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
